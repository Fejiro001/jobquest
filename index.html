<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Group 3" />
    <meta name="description" content="Find your dream job with JobQuest!" />
    <title>JobQuest</title>
    <link rel="icon" href="./assets/media/favicon.png?v=2" type="image/x-icon" />
    <script src="./assets/script/login.js" defer></script>
    <link rel="stylesheet" href="./assets/styles/index.css" />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="flex container">
      <div id="sidebanner">
        <div class="logo flex">
            <img src="./assets/media/images/logo.svg" alt="JobQuest Logo" />
            <h1>JobQuest</h1>
          </div>
      </div>
      <main class="flex">
        <form id="login" class="flex">
          <h1>Welcome Back</h1>
          <div class="flex">
            <label for="email">Email</label>
            <input type="email" id="email">
          </div>
          <div class="flex">
            <label for="password">Password</label>
            <input type="password" id="password">
          </div>
          <a id="forgotpw">Forgot password?</a>
          <div class="flex buttons">
            <input class="button primary-button" type="submit" value="Log in" id="login">
            <button class="button secondary-button" id="signup">Sign up</button>
          </div>
        </form>
      </main>
    </div>
  </body>
</html>
